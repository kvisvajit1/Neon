<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VKIX // NEURAL_CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap');
        
        :root {
            --theme-rgb: 252, 238, 10;
            --bg-black: #030303;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-black);
            color: #e5e5e5;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }

        .view-panel {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: var(--bg-black);
        }
        .view-panel.active { display: flex; }

        .clip-path-hex { clip-path: polygon(5% 0, 95% 0, 100% 50%, 95% 100%, 5% 100%, 0 50%); }
        .clip-path-panel { clip-path: polygon(0 0, 92% 0, 100% 8%, 100% 100%, 8% 100%, 0 92%); }
        .clip-path-bubble-r { clip-path: polygon(0 0, 95% 0, 100% 20%, 100% 100%, 8% 100%, 0 85%); }
        .clip-path-bubble-l { clip-path: polygon(5% 0, 100% 0, 100% 85%, 92% 100%, 0 100%, 0 20%); }
        
        .hazard-stripe {
            background: repeating-linear-gradient(45deg, rgb(var(--theme-rgb)), rgb(var(--theme-rgb)) 8px, #000 8px, #000 16px);
        }

        .cyber-border { border: 1px solid rgba(var(--theme-rgb), 0.25); }
        .cyber-glow { box-shadow: 0 0 20px rgba(var(--theme-rgb), 0.15); }
        .cyber-text-glow { text-shadow: 0 0 8px rgba(var(--theme-rgb), 0.5); }
        .story-ring {
            padding: 2px;
            background: conic-gradient(from 0deg, rgb(var(--theme-rgb)), transparent 70%);
            border-radius: 50%;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(var(--theme-rgb), 0.5); border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.3s ease-out; }

        .comment-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0a0a0a;
            border-top: 2px solid rgb(var(--theme-rgb));
            z-index: 3000;
            transform: translateY(100%);
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
        }
        .comment-drawer.active { transform: translateY(0); }
        
        .progress-bar {
            height: 2px;
            background: rgba(255,255,255,0.3);
            flex: 1;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: rgb(var(--theme-rgb));
            width: 0%;
        }

        /* Story viewer tap zones */
        .story-tap-left, .story-tap-right {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 50%;
            z-index: 20;
        }
        .story-tap-left { left: 0; }
        .story-tap-right { right: 0; }
    </style>
</head>
<body>

<!-- GLOBAL SCANLINE OVERLAY -->
<div class="fixed inset-0 pointer-events-none z-[9999] opacity-10">
    <div class="absolute inset-0 bg-[linear-gradient(rgba(0,0,0,0)_50%,rgba(0,0,0,0.2)_50%)] bg-[length:100%_4px]"></div>
</div>

<!-- ========================================= AUTH VIEW ========================================= -->
<div id="view-auth" class="view-panel active items-center justify-center p-6">
    <div class="w-full max-w-sm border border-[rgba(252,238,10,0.3)] p-8 bg-black relative clip-path-panel cyber-glow">
        <div class="absolute top-0 left-0 w-full h-1 hazard-stripe"></div>
        <div class="text-center mb-8 pt-4">
            <h1 class="text-3xl font-black italic tracking-tighter text-[rgb(var(--theme-rgb))]">VKIX_OS</h1>
            <p class="text-[8px] opacity-40 mt-1 uppercase tracking-widest">Neural Core v5.0</p>
        </div>
        <div class="flex gap-4 mb-6 justify-center">
            <button onclick="setAuthMode('login')" id="btn-login-mode" class="text-[9px] font-bold text-[rgb(var(--theme-rgb))] border-b-2 border-[rgb(var(--theme-rgb))]">ACCESS</button>

</div>

        <button onclick="showView('view-profile')" class="text-[rgb(var(--theme-rgb))]"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>

        <div class="flex items-center justify-between px-4 pt-2">

        <h3 class="text-[rgb(var(--theme-rgb))] text-xs font-black mb-6 uppercase text-center">Grid_Transmission</h3>

        <div id="post-media-preview" class="hidden mb-4 relative bg-black rounded-xl overflow-hidden"><img id="post-preview-img" class="w-full max-h-48 object-contain"><button onclick="clearPostMedia()" class="absolute top-2 right-2 bg-red-500 text-black w-6 h-6 font-black rounded-full">X</button></div>

<!-- ========================================= COMMENT DRAWER ========================================= -->
<div id="comment-drawer" class="comment-drawer max-w-md mx-auto h-[70vh] flex flex-col">
    <div class="p-4 border-b cyber-border/10 flex justify-between items-center bg-black"><span class="text-[9px] font-black text-[rgb(var(--theme-rgb))]">NEURAL_DECODING</span><button onclick="closeComments()" class="text-red-500 text-[10px] font-black">TERMINATE</button></div>
    <div id="comment-list" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
    <div class="p-4 bg-black border-t cyber-border/10"><div class="flex gap-2"><input id="comment-input" type="text" placeholder="SEND_COGNITIVE_REPLY..." class="flex-1 bg-zinc-900 text-[10px] text-[rgb(var(--theme-rgb))] p-3 outline-none rounded-xl"><button onclick="submitComment()" class="bg-[rgb(var(--theme-rgb))] text-black p-3 rounded-xl"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div></div>
</div>

<script>
    // STORAGE KEYS
    const DB = { USERS: 'vk_merged_users', POSTS: 'vk_merged_posts', CHATS: 'vk_merged_chats', STORIES: 'vk_merged_stories', COMMENTS: 'vk_merged_comments', ME: 'vk_merged_me', THEME: 'vk_merged_theme' };
    let currentUser = null, activeTab = 'direct', chatWith = null, activePostId = null;
    let pendingPostMedia = null, pendingChatMedia = null;
    let storyInterval = null, currentStoryIndex = 0, currentStoryList = [], currentVideoElement = null;

    const getData = (k) => JSON.parse(localStorage.getItem(k) || (k===DB.USERS || k===DB.CHATS ? '{}' : '[]'));
    const setData = (k,v) => localStorage.setItem(k, JSON.stringify(v));

    // Helper: file to base64
    const fileToB64 = (file) => new Promise(r=>{let fr=new FileReader(); fr.onload=e=>r(e.target.result); fr.readAsDataURL(file);});
    const renderMedia = (b64, cls="w-full rounded-lg") => b64 ? (b64.startsWith('data:video') ? `<video src="${b64}" controls class="${cls}"></video>` : `<img src="${b64}" class="${cls} object-contain max-h-64">`) : '';

    // ---- STORY HELPERS ----
    function deleteExpiredStories() {
        let stories = getData(DB.STORIES);
        const now = Date.now();
        const filtered = stories.filter(s => s.expiresAt > now);
        if (filtered.length !== stories.length) {
            setData(DB.STORIES, filtered);
        }
        return filtered;
    }

    function getUserStories(userId) {
        deleteExpiredStories();
        return getData(DB.STORIES).filter(s => s.owner === userId);
    }

    function hasActiveStories(userId) {
        return getUserStories(userId).length > 0;
    }

    // Upload story (public, 24h expiration)
    window.uploadStory = async (input) => {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        const b64 = await fileToB64(file);
        const stories = getData(DB.STORIES);
        stories.push({
            id: Date.now() + '-' + Math.random().toString(36).substr(2, 6),
            owner: currentUser,
            media: b64,
            type: file.type,
            timestamp: Date.now(),
            expiresAt: Date.now() + 24 * 60 * 60 * 1000 // 24 hours
        });
        setData(DB.STORIES, stories);
        renderStories();
        input.value = ''; // reset input
    };

    // Render story rings
    function renderStories() {
        const bar = document.getElementById('stories-bar');
        bar.innerHTML = '';
        deleteExpiredStories();
        
        // "Your story" ring
        const myStoryRing = document.createElement('div');
        myStoryRing.className = "flex-shrink-0 flex flex-col items-center gap-1 cursor-pointer group";
        const myStories = getUserStories(currentUser);
        const hasMyStory = myStories.length > 0;
        myStoryRing.innerHTML = `
            <div class="w-14 h-14 ${hasMyStory ? 'story-ring' : 'border-2 border-dashed border-cyber/50'} rounded-full flex items-center justify-center bg-black">
                <div class="w-full h-full rounded-full overflow-hidden flex items-center justify-center bg-zinc-900">
                    <img src="${getData(DB.USERS)[currentUser].avatar}" class="w-full h-full object-cover rounded-full">
                </div>
            </div>
            <span class="text-[7px] font-bold text-cyber uppercase">Your story</span>
        `;
        myStoryRing.onclick = () => {
            if (hasMyStory) {
                playStories(currentUser);
            } else {
                document.getElementById('story-upload').click();
            }
        };
        bar.appendChild(myStoryRing);
        
        // Other users' stories
        const users = getData(DB.USERS);
        Object.values(users).forEach(u => {
            if (u.id === currentUser) return;
            const userStories = getUserStories(u.id);
            if (userStories.length === 0) return;
            const ring = document.createElement('div');
            ring.className = "flex-shrink-0 flex flex-col items-center gap-1 cursor-pointer hover:scale-105 transition-transform";
            ring.innerHTML = `
                <div class="w-14 h-14 story-ring">
                    <div class="w-full h-full rounded-full overflow-hidden bg-black">
                        <img src="${u.avatar}" class="w-full h-full object-cover rounded-full">
                    </div>
                </div>
                <span class="text-[7px] font-black text-cyber">@${u.id}</span>
            `;
            ring.onclick = () => playStories(u.id);
            bar.appendChild(ring);
        });
        
        // Update the header ring for current user
        const myHeaderRing = document.getElementById('my-story-ring');
        if (hasMyStory) {
            myHeaderRing.classList.add('story-ring');
        } else {
            myHeaderRing.classList.remove('story-ring');
        }
    }

    // Story player
    function playStories(userId) {
        const stories = getUserStories(userId);
        if (stories.length === 0) return;
        currentStoryList = stories;
        currentStoryIndex = 0;
        const user = getData(DB.USERS)[userId];
        document.getElementById('story-user-avatar').src = user.avatar;
        document.getElementById('story-user-id').innerHTML = `@${userId}`;
        document.getElementById('story-viewer').classList.add('active');
        showCurrentStory();
    }
    
    function showCurrentStory() {
        if (storyInterval) clearInterval(storyInterval);
        if (currentVideoElement) {
            currentVideoElement.pause();
            currentVideoElement.removeEventListener('ended', onVideoEnd);
            currentVideoElement = null;
        }
        
        const story = currentStoryList[currentStoryIndex];
        if (!story) {
            closeStories();
            return;
        }
        
        // Update progress bars
        const container = document.getElementById('story-progress-container');
        container.innerHTML = currentStoryList.map((_, idx) => `
            <div class="progress-bar">
                <div class="progress-fill" id="story-progress-${idx}" style="width: ${idx < currentStoryIndex ? '100%' : idx === currentStoryIndex ? '0%' : '0%'}"></div>
            </div>
        `).join('');
        
        const contentDiv = document.getElementById('story-content');
        contentDiv.innerHTML = '';
        
        const isVideo = story.type && story.type.startsWith('video');
        if (isVideo) {
            const video = document.createElement('video');
            video.src = story.media;
            video.autoplay = true;
            video.className = "max-h-full max-w-full object-contain";
            video.addEventListener('ended', onVideoEnd);
            video.addEventListener('loadedmetadata', () => {
                // Start progress animation based on video duration
                startStoryProgress(video.duration * 1000);
            });
            contentDiv.appendChild(video);
            currentVideoElement = video;
        } else {
            const img = document.createElement('img');
            img.src = story.media;
            img.className = "max-h-full max-w-full object-contain";
            contentDiv.appendChild(img);
            startStoryProgress(5000); // 5 seconds for images
        }
    }
    
    function startStoryProgress(durationMs) {
        const fill = document.getElementById(`story-progress-${currentStoryIndex}`);
        if (!fill) return;
        fill.style.width = '0%';
        const startTime = Date.now();
        storyInterval = setInterval(() => {
            const elapsed = Date.now() - startTime;
            const percent = Math.min(100, (elapsed / durationMs) * 100);
            fill.style.width = percent + '%';
            if (percent >= 100) {
                clearInterval(storyInterval);
                nextStory();
            }
        }, 50);
    }
    
    function onVideoEnd() {
        clearInterval(storyInterval);
        nextStory();
    }
    
    window.nextStory = () => {
        if (currentStoryIndex + 1 < currentStoryList.length) {
            currentStoryIndex++;
            showCurrentStory();
        } else {
            closeStories();
        }
    };
    
    window.prevStory = () => {
        if (currentStoryIndex > 0) {
            currentStoryIndex--;
            showCurrentStory();
        } else {
            closeStories();
        }
    };
    
    window.closeStories = () => {
        document.getElementById('story-viewer').classList.remove('active');
        if (storyInterval) clearInterval(storyInterval);
        if (currentVideoElement) {
            currentVideoElement.pause();
            currentVideoElement.removeEventListener('ended', onVideoEnd);
            currentVideoElement = null;
        }
        currentStoryList = [];
        currentStoryIndex = 0;
    };
    
    // ========== OTHER FUNCTIONS (same as before, but with story integration) ==========
    function seedData() {
        let users = getData(DB.USERS);
        if (Object.keys(users).length === 0) {
            const demoUsers = {
                'neo_tech': { id:'neo_tech', p:'1234', avatar:'https://api.dicebear.com/7.x/bottts/svg?seed=neo', contacts:[], likedPosts:[] },
                'cyber_vixen': { id:'cyber_vixen', p:'1234', avatar:'https://api.dicebear.com/7.x/bottts/svg?seed=vixen', contacts:[], likedPosts:[] },
                'ghost_01': { id:'ghost_01', p:'1234', avatar:'https://api.dicebear.com/7.x/bottts/svg?seed=ghost', contacts:[], likedPosts:[] },
                'guest': { id:'guest', p:'1234', avatar:'https://api.dicebear.com/7.x/bottts/svg?seed=guest', contacts:['neo_tech'], likedPosts:[] }
            };
            demoUsers.neo_tech.contacts = ['cyber_vixen','ghost_01']; demoUsers.cyber_vixen.contacts = ['neo_tech']; demoUsers.ghost_01.contacts = ['neo_tech'];
            setData(DB.USERS, demoUsers);
            const demoPosts = [{ id:'p1', owner:'neo_tech', avatar:demoUsers.neo_tech.avatar, text:'Mainframe uplink established. Neural resonance detected.', media:null, timestamp:Date.now(), likes:2 }];
            setData(DB.POSTS, demoPosts);
            setData(DB.CHATS, {});
            setData(DB.STORIES, []);
            setData(DB.COMMENTS, {});
        }
    }
    
    let authMode = 'login';
    window.setAuthMode = (m) => { authMode = m; document.getElementById('signup-fields').classList.toggle('hidden', m==='login'); document.getElementById('btn-login-mode').classList.toggle('border-b-2', m==='login'); document.getElementById('btn-login-mode').classList.toggle('opacity-40', m!=='login'); document.getElementById('btn-signup-mode').classList.toggle('border-b-2', m==='signup'); document.getElementById('btn-signup-mode').classList.toggle('opacity-40', m!=='signup'); };
    window.handleAuth = () => {
        const id = document.getElementById('auth-identifier').value.trim().toLowerCase();
        const pwd = document.getElementById('auth-pass').value.trim();
        if (!id || !pwd) return;
        let users = getData(DB.USERS);
        if (authMode === 'signup') {
            if (users[id]) return showError('Handle exists');
            users[id] = { id, p:pwd, avatar:`https://api.dicebear.com/7.x/bottts/svg?seed=${id}`, contacts:[], likedPosts:[] };
            setData(DB.USERS, users);
            loginUser(id);
        } else {
            if (users[id] && users[id].p === pwd) loginUser(id);
            else showError('Invalid credentials');
        }
    };
    function showError(msg) { let e = document.getElementById('auth-error'); e.innerText = msg; e.classList.remove('hidden'); setTimeout(()=>e.classList.add('hidden'),2000); }
    function loginUser(id) { currentUser = id; localStorage.setItem(DB.ME, id); loadApp(); }
    function loadApp() {
        const me = getData(DB.USERS)[currentUser];
        document.getElementById('my-avatar-top').src = me.avatar;
        document.getElementById('my-handle-top').innerText = `@${currentUser}`;
        document.getElementById('profile-img').src = me.avatar;
        document.getElementById('profile-handle').innerText = `@${currentUser}`;
        document.getElementById('stat-contacts').innerText = me.contacts.length;
        document.getElementById('stat-posts').innerText = getData(DB.POSTS).filter(p=>p.owner===currentUser).length;
        showView('view-main');
        renderStories();
        switchTab('direct');
    }
    window.signOut = () => { localStorage.removeItem(DB.ME); location.reload(); };
    window.updateAvatar = async (input) => { if(input.files[0]){ let b64=await fileToB64(input.files[0]); let u=getData(DB.USERS); u[currentUser].avatar=b64; setData(DB.USERS,u); loadApp(); } };
    window.setTheme = (rgb) => { document.documentElement.style.setProperty('--theme-rgb', rgb); localStorage.setItem(DB.THEME, rgb); };
    window.showView = (id) => { document.querySelectorAll('.view-panel').forEach(v=>v.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id==='view-chat' && chatWith) renderMessages(); };
    window.switchTab = (t) => { activeTab=t; const d=document.getElementById('tab-direct'), v=document.getElementById('tab-vocal'); d.className=`flex-1 py-5 text-center border-b-2 ${t==='direct'?'border-[rgb(var(--theme-rgb))] text-[rgb(var(--theme-rgb))]':'border-transparent opacity-40 text-[rgb(var(--theme-rgb))]'}`; v.className=`flex-1 py-5 text-center border-b-2 ${t==='vocal'?'border-[rgb(var(--theme-rgb))] text-[rgb(var(--theme-rgb))]':'border-transparent opacity-40 text-[rgb(var(--theme-rgb))]'}`; t==='direct'?renderContacts():renderFeed(); };
    
    function renderFeed() { const stream=document.getElementById('main-content-stream'); stream.innerHTML=''; const posts=getData(DB.POSTS).sort((a,b)=>b.timestamp-a.timestamp); posts.forEach(p=>{ const me=getData(DB.USERS)[currentUser]; const isLiked=me.likedPosts?.includes(p.id); const comments=getData(DB.COMMENTS)[p.id]||[]; const div=document.createElement('div'); div.className="bg-zinc-900/30 p-5 border cyber-border clip-path-panel animate-fade"; div.innerHTML=`<div class="flex items-center gap-3 mb-4 cursor-pointer" onclick="openChat('${p.owner}')"><img src="${p.avatar}" class="w-8 h-8 rounded-lg border cyber-border/30"><span class="text-[10px] font-black text-[rgb(var(--theme-rgb))] uppercase">@${p.owner}</span></div><p class="text-[11px] text-zinc-300 leading-relaxed mb-3">${escapeHtml(p.text)}</p>${p.media?`<div class="mb-4">${renderMedia(p.media)}</div>`:''}<div class="flex gap-6 border-t cyber-border/5 pt-4"><button onclick="toggleLike('${p.id}')" class="flex items-center gap-1 text-[8px] font-black ${isLiked?'text-red-500':'text-[rgb(var(--theme-rgb))]/40'}"><svg width="14" height="14" fill="${isLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ${p.likes||0}</button><button onclick="openComments('${p.id}')" class="flex items-center gap-1 text-[8px] font-black text-[rgb(var(--theme-rgb))]/40"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> ${comments.length}</button></div>`; stream.appendChild(div); }); }
    window.toggleLike = (postId) => { let users=getData(DB.USERS), posts=getData(DB.POSTS), me=users[currentUser]; const pIdx=posts.findIndex(p=>p.id===postId); if(pIdx===-1) return; const liked=me.likedPosts.includes(postId); if(liked){ me.likedPosts=me.likedPosts.filter(id=>id!==postId); posts[pIdx].likes=(posts[pIdx].likes||1)-1; }else{ me.likedPosts.push(postId); posts[pIdx].likes=(posts[pIdx].likes||0)+1; } users[currentUser]=me; setData(DB.USERS,users); setData(DB.POSTS,posts); if(activeTab==='vocal') renderFeed(); };
    window.submitPost = async () => { let txt=document.getElementById('post-text').value.trim(); if(!txt && !pendingPostMedia) return; let posts=getData(DB.POSTS), me=getData(DB.USERS)[currentUser]; posts.unshift({ id:Date.now().toString(36), owner:currentUser, avatar:me.avatar, text:txt, media:pendingPostMedia, timestamp:Date.now(), likes:0 }); setData(DB.POSTS,posts); closePostModal(); if(activeTab==='vocal') renderFeed(); document.getElementById('stat-posts').innerText = posts.filter(p=>p.owner===currentUser).length; };
    window.openPostModal = () => { document.getElementById('modal-post').classList.remove('hidden'); };
    window.closePostModal = () => { document.getElementById('modal-post').classList.add('hidden'); document.getElementById('post-text').value=''; clearPostMedia(); };
    window.previewPostMedia = async (input) => { if(input.files[0]){ pendingPostMedia=await fileToB64(input.files[0]); document.getElementById('post-preview-img').src=pendingPostMedia; document.getElementById('post-media-preview').classList.remove('hidden'); } };
    window.clearPostMedia = () => { pendingPostMedia=null; document.getElementById('post-media-preview').classList.add('hidden'); };
    
    window.openComments = (postId) => { activePostId=postId; document.getElementById('comment-drawer').classList.add('active'); renderComments(); };
    window.closeComments = () => { document.getElementById('comment-drawer').classList.remove('active'); activePostId=null; };
    function renderComments(){ const list=document.getElementById('comment-list'); list.innerHTML=''; const comments=getData(DB.COMMENTS)[activePostId]||[]; comments.forEach(c=>{ let div=document.createElement('div'); div.className="flex gap-3 border-l border-zinc-800 pl-3"; div.innerHTML=`<img src="${c.avatar}" class="w-6 h-6 clip-path-hex"><div><span class="text-[8px] font-black text-[rgb(var(--theme-rgb))]">@${c.handle}</span><p class="text-[9px] text-zinc-300 mt-1">${escapeHtml(c.txt)}</p></div>`; list.appendChild(div); }); }
    window.submitComment = () => { let txt=document.getElementById('comment-input').value.trim(); if(!txt||!activePostId) return; let comments=getData(DB.COMMENTS); if(!comments[activePostId]) comments[activePostId]=[]; let me=getData(DB.USERS)[currentUser]; comments[activePostId].push({ handle:currentUser, avatar:me.avatar, txt:txt, timestamp:Date.now() }); setData(DB.COMMENTS,comments); document.getElementById('comment-input').value=''; renderComments(); if(activeTab==='vocal') renderFeed(); };
    
    function renderContacts(){ const stream=document.getElementById('main-content-stream'); stream.innerHTML=''; const me=getData(DB.USERS)[currentUser]; if(me.contacts.length===0){ stream.innerHTML='<div class="py-20 text-center opacity-20 text-[10px]">No neural links</div>'; return; } me.contacts.forEach(c=>{ const u=getData(DB.USERS)[c]; if(!u) return; const div=document.createElement('div'); div.className="flex items-center gap-5 p-5 bg-zinc-900/20 border-l-2 hover:border-[rgb(var(--theme-rgb))] cursor-pointer"; div.innerHTML=`<img src="${u.avatar}" class="w-12 h-12 clip-path-hex border cyber-border/40"><div><span class="text-[11px] font-black text-[rgb(var(--theme-rgb))] uppercase">@${u.id}</span><p class="text-[8px] text-zinc-500">Encrypted_Line</p></div>`; div.onclick=()=>openChat(c); stream.appendChild(div); }); }
    window.openChat = (target) => { chatWith=target; const u=getData(DB.USERS)[target]; document.getElementById('chat-avatar').src=u.avatar; document.getElementById('chat-handle').innerText=`@${target.toUpperCase()}`; showView('view-chat'); renderMessages(); };
    function renderMessages(){ const box=document.getElementById('chat-messages'); box.innerHTML=''; const key=[currentUser,chatWith].sort().join('_'); const msgs=getData(DB.CHATS)[key]||[]; msgs.forEach(m=>{ const isMe=m.from===currentUser; const div=document.createElement('div'); div.className=`flex ${isMe?'justify-end':'justify-start'}`; div.innerHTML=`<div class="max-w-[85%] p-4 text-[10px] ${isMe?'bg-[rgb(var(--theme-rgb))] text-black clip-path-bubble-r':'bg-zinc-900 border cyber-border/40 text-white clip-path-bubble-l'}">${m.text?`<p class="font-bold">${escapeHtml(m.text)}</p>`:''}${m.media?`<div class="mt-2">${renderMedia(m.media)}</div>`:''}<p class="text-[6px] mt-2 opacity-50 text-right">${m.time||''}</p></div>`; box.appendChild(div); }); box.scrollTop=box.scrollHeight; }
    window.sendChatMessage = async () => { const txt=document.getElementById('chat-input').value.trim(); if(!txt && !pendingChatMedia) return; const chats=getData(DB.CHATS); const key=[currentUser,chatWith].sort().join('_'); if(!chats[key]) chats[key]=[]; chats[key].push({ from:currentUser, text:txt, media:pendingChatMedia, time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) }); setData(DB.CHATS,chats); document.getElementById('chat-input').value=''; clearChatAttachment(); renderMessages(); };
    window.handleChatFileSelect = async (input) => { if(input.files[0]){ pendingChatMedia=await fileToB64(input.files[0]); document.getElementById('chat-filename').innerText=`ATTACHMENT: ${input.files[0].name}`; document.getElementById('chat-attachment-status').classList.remove('hidden'); } };
    window.clearChatAttachment = () => { pendingChatMedia=null; document.getElementById('chat-attachment-status').classList.add('hidden'); };
    window.viewTargetProfile = () => { if(chatWith) openChat(chatWith); };
    
    window.runSearch = (q) => { const res=document.getElementById('search-results'); res.innerHTML=''; if(!q) return; const users=getData(DB.USERS); const me=getData(DB.USERS)[currentUser]; Object.values(users).forEach(u=>{ if(u.id.includes(q.toLowerCase()) && u.id!==currentUser && !me.contacts.includes(u.id)){ const div=document.createElement('div'); div.className="flex items-center gap-4 p-4 bg-zinc-900/60 border cyber-border cursor-pointer"; div.innerHTML=`<img src="${u.avatar}" class="w-10 h-10 clip-path-hex"><span class="text-[11px] font-black text-[rgb(var(--theme-rgb))]">@${u.id}</span>`; div.onclick=()=>{ let users2=getData(DB.USERS); if(!users2[currentUser].contacts.includes(u.id)) users2[currentUser].contacts.push(u.id); setData(DB.USERS,users2); openChat(u.id); }; res.appendChild(div); } }); };
    
    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    
    // INIT
    const savedTheme = localStorage.getItem(DB.THEME); if(savedTheme) setTheme(savedTheme);
    seedData();
    const savedUser = localStorage.getItem(DB.ME);
    if(savedUser && getData(DB.USERS)[savedUser]) loginUser(savedUser);
    else showView('view-auth');
</script>
